document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

kground:#f4ece0; color:#5c4b3e; font-family:'Hanken Grotesk',system-ui,sans-serif;\">\n\n  <!-- ===== HEADER ===== -->\n  <header style=\"position:sticky; top:0; z-index:50; background:rgba(244,236,224,0.96); border-bottom:1px solid #e6d9c6; backdrop-filter:blur(10px);\">\n    <div data-r=\"shell header-inner\" style=\"width:min(1320px, calc(100% - 112px)); margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:24px; padding:22px 0;\">\n      <a href=\"#accueil\" style=\"display:flex; align-items:center; text-decoration:none;\">\n        <img src=\"0f38820c-9c9c-4a5c-9b78-0cde341d7c80\" alt=\"La fabrique sociale\" style=\"height:96px; width:auto; display:block;\">\n      <\u002Fa>\n      <nav data-r=\"nav\" style=\"display:flex; align-items:center; gap:32px; flex-wrap:wrap;\">\n        <a href=\"#accueil\" style=\"color:#5c4b3e; font-size:15px; font-weight:500; text-decoration:none;\">Accueil<\u002Fa>\n        <a href=\"#apropos\" style=\"color:#5c4b3e; font-size:15px; font-weight:500; text-decoration:none;\">A propos<\u002Fa>\n        <a href=\"#domaines\" style=\"color:#5c4b3e; font-size:15px; font-weight:500; text-decoration:none;\">Domaines d'intervention<\u002Fa>\n        <a href=\"#contact\" style=\"display:inline-flex; align-items:center; justify-content:center; padding:11px 22px; border-radius:999px; background:#bc5b3a; color:#fff; font-size:14px; font-weight:600; text-decoration:none;\">Prendre contact<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== HERO ===== -->\n  <section id=\"accueil\" style=\"padding:84px 0 80px;\">\n    <div data-r=\"shell hero-inner\" style=\"width:min(1320px, calc(100% - 112px)); margin:0 auto; display:flex; align-items:center; gap:64px; flex-direction:{{ heroDir }};\">\n      <div style=\"flex:1;\">\n        <div style=\"margin-bottom:30px; color:#bc5b3a; font-size:12px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; display:inline-flex; align-items:center; gap:9px;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#bc5b3a;\"><\u002Fspan>Assistante sociale independante<\u002Fdiv>\n        <h1 style=\"margin:0 0 26px; color:#3a2a20; font-family:'Cormorant Garamond',serif; font-size:clamp(52px,8vw,72px); font-weight:500; line-height:1; letter-spacing:-0.02em;\">Quand le systeme bloque,<br><em style=\"color:#bc5b3a; font-style:italic;\">je suis la.<\u002Fem><\u002Fh1>\n        <p style=\"max-width:470px; margin:0 0 32px; font-size:18px; line-height:1.65;\">La fabrique sociale vous aide a reprendre la main sur vos demarches avec ecoute, confidentialite et un accompagnement sur mesure.<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:13px; margin-bottom:34px;\">\n          <div style=\"display:flex; align-items:center; gap:13px; color:#3a2a20; font-size:16px;\"><span style=\"display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:50%; background:#f2e3cb; color:#9a6a2e; flex:none;\"><svg style=\"width:13px; height:13px;\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><span>Debloquer vos demarches administratives<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:13px; color:#3a2a20; font-size:16px;\"><span style=\"display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:50%; background:#f2e3cb; color:#9a6a2e; flex:none;\"><svg style=\"width:13px; height:13px;\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><span>Comprendre et faire valoir vos droits<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:13px; color:#3a2a20; font-size:16px;\"><span style=\"display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:50%; background:#f2e3cb; color:#9a6a2e; flex:none;\"><svg style=\"width:13px; height:13px;\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><span>Avancer concretement, a votre rythme<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:18px; flex-wrap:wrap;\">\n          <a href=\"#contact\" style=\"display:inline-flex; align-items:center; justify-content:center; border-radius:999px; font-weight:600; padding:15px 30px; background:#bc5b3a; color:#fff; font-size:16px; text-decoration:none;\">Prendre contact<\u002Fa>\n          <a href=\"#domaines\" style=\"display:inline-flex; align-items:center; justify-content:center; border-radius:999px; font-weight:600; gap:9px; border-bottom:2px solid currentColor; padding-bottom:3px; color:#3a2a20; font-size:16px; text-decoration:none;\">Decouvrir l'accompagnement →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-r=\"hero-visual\" style=\"position:relative; width:400px; flex:none;\">\n        <div data-r=\"portrait\" style=\"display:flex; height:490px; width:400px; flex-direction:column; align-items:center; justify-content:center; gap:14px; border:1px solid #ddcbb0; border-radius:200px 200px 22px 22px; background:#e7d7bf; color:#a08a6b;\">\n          <svg style=\"width:48px; height:48px;\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M4 21c0-4 4-6 8-6s8 2 8 6\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:13px; font-weight:500;\">Portrait a fournir<\u002Fspan>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showFloatCard }}\" hint-placeholder-val=\"{{ true }}\">\n          <div data-r=\"float-card\" style=\"position:absolute; left:-32px; bottom:40px; width:252px; padding:18px 22px; border:1px solid #ef 002Fsvg><\u002Fdiv>\n          <h3 style=\"margin:0 0 9px; color:#3a2a20; font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:600;\">Le budget<\u002Fh3>\n          <p style=\"margin:0; color:#7a6b5e; font-size:14.5px; line-height:1.55;\">Gestion budgetaire, aide financiere, aide a la constitution d'un dossier de surendettement.<\u002Fp>\n          <a onclick=\"{{ openBudget }}\" style=\"display:inline-flex; align-items:center; gap:6px; margin-top:18px; color:#bc5b3a; font-size:14px; font-weight:600; text-decoration:none; cursor:pointer;\">En savoir plus →<\u002Fa>\n        <\u002Farticle>\n        <article style=\"border:1px solid #efe3d2; border-radius:18px; background:#fff; padding:28px 26px;\">\n          <div style=\"width:54px; height:54px; margin-bottom:20px; border-radius:27px 27px 8px 8px; background:#f2e3cb; display:flex; align-items:center; justify-content:center; color:#bc5b3a;\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"9\" cy=\"8.5\" r=\"3\"><\u002Fcircle><path d=\"M3.5 19.5c0-3 2.5-4.8 5.5-4.8s5.5 1.8 5.5 4.8\"><\u002Fpath><circle cx=\"17.5\" cy=\"9.5\" r=\"2.2\"><\u002Fcircle><path d=\"M16 14.8c2.3.4 3.8 1.9 3.8 4.2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"margin:0 0 9px; color:#3a2a20; font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:600;\">La famille<\u002Fh3>\n          <p style=\"margin:0; color:#7a6b5e; font-size:14.5px; line-height:1.55;\">Parentalite, gestion des conflits familiaux, deuil, accompagnement des personnes agees.<\u002Fp>\n          <a onclick=\"{{ openFamille }}\" style=\"display:inline-flex; align-items:center; gap:6px; margin-top:18px; color:#bc5b3a; font-size:14px; font-weight:600; text-decoration:none; cursor:pointer;\">En savoir plus →<\u002Fa>\n        <\u002Farticle>\n        <article style=\"border:1px solid #efe3d2; border-radius:18px; background:#fff; padding:28px 26px;\">\n          <div style=\"width:54px; height:54px; margin-bottom:20px; border-radius:27px 27px 8px 8px; background:#f2e3cb; display:flex; align-items:center; justify-content:center; color:#bc5b3a;\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 8.5l-1-1a2.2 2.2 0 0 0-3.2 3L12 14.7l4.2-4.2a2.2 2.2 0 0 0-3.2-3l-1 1z\"><\u002Fpath><path d=\"M4 20c1.8-1.8 3.8-2 5.5-1.1\"><\u002Fpath><path d=\"M20 20c-1.8-1.8-3.8-2-5.5-1.1\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"margin:0 0 9px; color:#3a2a20; font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:600;\">Le handicap<\u002Fh3>\n          <p style=\"margin:0; color:#7a6b5e; font-size:14.5px; line-height:1.55;\">Reconnaissance du handicap, maintien dans l'emploi, aides financieres, materielles et humaines.<\u002Fp>\n          <a onclick=\"{{ openHandicap }}\" style=\"display:inline-flex; align-items:center; gap:6px; margin-top:18px; color:#bc5b3a; font-size:14px; font-weight:600; text-decoration:none; cursor:pointer;\">En savoir plus →<\u002Fa>\n        <\u002Farticle>\n        <article style=\"border:1px solid #efe3d2; border-radius:18px; background:#fff; padding:28px 26px;\">\n          <div style=\"width:54px; height:54px; margin-bottom:20px; border-radius:27px 27px 8px 8px; background:#f2e3cb; display:flex; align-items:center; justify-content:center; color:#bc5b3a;\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"7.5\" width=\"18\" height=\"12\" rx=\"2\"><\u002Frect><path d=\"M9 7.5V6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1.5\"><\u002Fpath><path d=\"M3 12.5h18\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"margin:0 0 9px; color:#3a2a20; font-family:'Cormorant Garamond',serif; font-size: rder:1px solid #efe3d2; border-radius:20px; background:#fff; padding:32px 30px;\">\n            <div style=\"margin-bottom:16px; color:#a08a6b; font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase;\">Phase 1<\u002Fdiv>\n            <h3 style=\"margin:0 0 9px; color:#3a2a20; font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:600;\">Echange telephonique<\u002Fh3>\n            <p style=\"margin:0; color:#7a6b5e; font-size:15px; line-height:1.6;\">Diagnostic gratuit. A partir de cet echange, je vous transmets un devis selon le forfait adapte a votre situation.<\u002Fp>\n          <\u002Farticle>\n          <article style=\"border:1px solid #efe3d2; border-radius:20px; background:#fff; padding:32px 30px;\">\n            <div style=\"margin-bottom:16px; color:#a08a6b; font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase;\">Phase 2<\u002Fdiv>\n            <h3 style=\"margin:0 0 9px; color:#3a2a20; font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:600;\">Rendez-vous physique<\u002Fh3>\n            <p style=\"margin:0; color:#7a6b5e; font-size:15px; line-height:1.6;\">Rencontre et mise en place du lien de confiance. Je vous conseille et vous guide vers des outils adaptes.<\u002Fp>\n          <\u002Farticle>\n          <article style=\"border:1px solid #efe3d2; border-radius:20px; background:#fff; padding:32px 30px;\">\n            <div style=\"margin-bottom:16px; color:#a08a6b; font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase;\">Phase 3<\u002Fdiv>\n            <h3 style=\"margin:0 0 9px; color:#3a2a20; font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:600;\">Administratif et suivi<\u002Fh3>\n            <p style=\"margin:0; color:#7a6b5e; font-size:15px; line-height:1.6;\">En dehors de nos echanges : analyse, redaction, coordination, negociations avec les organismes concernes.<\u002Fp>\n          <\u002Farticle>\n        <\u002Fdiv>\n Fdiv>\n        <div style=\"display:flex; align-items:center; gap:14px;\">\n          <div style=\"display:flex; align-items:center; justify-content:center; width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.16); color:#fff; font-size:18px;\">✉<\u002Fdiv>\n          <div>\n            <div style=\"margin-bottom:4px; color:#f2d8b8; font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase;\">M'ecrire<\u002Fdiv>\n            <a href=\"mailto:contact@lafabriquesociale.fr\" style=\"color:#fff; font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:600; text-decoration:none;\">contact@lafabriquesociale.fr<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ openRdv }}\" style=\"align-self:flex-start; margin-top:6px; padding:14px 28px; border:none; border-radius:999px; background:#fff; color:#bc5b3a; font-size:16px; font-weight:700; cursor:pointer; font-family:'Hanken Grotesk',sans-serif;\">Prendre rendez-vous<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"padding:56px 0 40px; background:#3a2a20;\">\n    <div data-r=\"shell\" style=\"width:min(1320px, calc(100% - 112px)); margin:0 auto;\">\n      <div style=\"display:flex; justify-content:space-between; gap:32px; flex-wrap:wrap; padding-bottom:36px; border-bottom:1px solid rgba(255,255,255,0.12);\">\n        <div style=\"max-width:340px;\">\n          <img src=\"749b4cbc-530f-46ec-9fb9-63cebb36b3f2\" alt=\"La fabrique sociale\" style=\"height:104px; width:auto; display:block; margin-bottom:16px;\">\n          <p style=\"margin:0; color:#a8978a; font-size:14.5px; line-height:1.55;\">Assistante sociale independante. Un accompagnement humain, confidentiel et sur mesure.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:64px; flex-wrap:wrap;\">\n          <div style=\"display:flex; flex-direction:column; gap:11px;\">\n            <div style=\"marg 100%; border-radius:24px; padding:44px; box-shadow:0 30px 80px rgba(58,42,32,0.4);\">\n        <button onclick=\"{{ closeModal }}\" aria-label=\"Fermer\" style=\"position:absolute; top:20px; right:20px; width:36px; height:36px; border:none; border-radius:50%; background:#f2e3cb; color:#9a6a2e; font-size:20px; line-height:1; cursor:pointer;\">×<\u002Fbutton>\n        <div style=\"color:#bc5b3a; font-size:12px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase;\">Domaine d'intervention<\u002Fdiv>\n        <h3 style=\"margin:10px 0 0; color:#3a2a20; font-family:'Cormorant Garamond',serif; font-size:34px; font-weight:600; line-height:1.05;\">{{ modalTitle }}<\u002Fh3>\n        <p style=\"margin:12px 0 0; color:#5c4b3e; font-size:16px; line-height:1.6;\">{{ modalIntro }}<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:13px; margin-top:24px;\">\n          <sc-for list=\"{{ modalPoints }}\" as=\"pt\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; gap:12px; align-items:flex-start;\">\n              <span style=\"flex:none; margin-top:2px; display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; background:#f2e3cb; color:#9a6a2e;\"><svg style=\"width:12px; height:12px;\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>\n              <span style=\"font-size:15px; line-height:1.5; color:#5c4b3e;\">{{ pt }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:18px; align-items:center; margin-top:30px;\">\n          <button onclick=\"{{ closeModal }}\" style=\"border:none; background:none; color:#3a2a20; font-size:16px; font-weight:600; border-bottom:2px solid currentColor; padding:0 0 3px; cursor:pointer;\">Fermer<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== FICHE PARCOURS (modale) ===== -->\n  <sc-if value=\"{{ aboutOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeModal }}\" style=\"position:fixed; inset:0; z-index:100; background:rgba(58,42,32,0.55); display:flex; align-items:center; justify-content:center; padding:24px;\">\n      <div onclick=\"{{ stopProp }}\" style=\"position:relative; background:#fbf6ee; max-width:600px; width:100%; border-radius:24px; padding:44px; box-shadow:0 30px 80px rgba(58,42,32,0.4); max-height:85vh; overflow:auto;\">\n        <button onclick=\"{{ closeModal }}\" aria-label=\"Fermer\" style=\"position:absolute; top:20px; right:20px; width:36px; height:36px; border:none; border-radius:50%; background:#f2e3cb; color:#9a6a2e; font-size:20px; line-height:1; cursor:pointer;\">×<\u002Fbutton>\n        <div style=\"color:#bc5b3a; font-size:12px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase;\">Parcours<\u002Fdiv>\n        <h3 style=\"margin:10px 0 0; color:#3a2a20; font-family:'Cormorant Garamond',serif; font-size:34px; font-weight:600; line-height:1.05;\">Ludivine FAYANT VERRIERE<\u002Fh3>\n        <div style=\"display:flex; flex-direction:column; gap:14px; margin-top:18px;\">\n          <sc-for list=\"{{ aboutParas }}\" as=\"para\" hint-placeholder-count=\"4\">\n            <p style=\"margin:0; color:#5c4b3e; font-size:16px; line-height:1.7;\">{{ para }}<\u002Fp>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:18px; align-items:center; margin-top:28px;\">\n          <button onclick=\"{{ closeModal }}\" style=\"border:none; background:none; color:#3a2a20; font-size:16px; font-weight:600; border-bottom:2px solid currentColor; padding:0 0 3px; cursor:pointer;\">Fermer<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== PRISE DE RENDEZ-VOUS (modale) ===== -->\n  <sc-if value=\"{{ rdvOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeModal }}\" style=\"position:fixed; inset:0; z-index:100; background:rgba(58,42,32,0.55); display:flex; align-items:center; justify-content:center; padding:24px;\">\n      <div onclick=\"{{ stopProp }}\" style=\"position:relative; background:#fbf6ee; max-width:480px; width:100%; border-radius:24px; padding:44px; box-shadow:0 30px 80px rgba(58,42,32,0.4); max-height:88vh; overflow:auto;\">\n        <button onclick=\"{{ closeModal }}\" aria-label=\"Fermer\" style=\"position:absolute; top:20px; right:20px; width:36px; height:36px; border:none; border-radius:50%; background:#f2e3cb; color:#9a6a2e; font-size:20px; line-height:1; cursor:pointer;\">×<\u002Fbutton>\n        <div style=\"color:#bc5b3a; font-size:12px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase;\">Rendez-vous<\u002Fdiv>\n        <h3 style=\"margin:10px 0 0; color:#3a2a20; font-family:'Cormorant Garamond',serif; font-size:32px; font-weight:600; line-height:1.05;\">Prendre rendez-vous<\u002Fh3>\n        <p style=\"margin:10px 0 0; color:#5c4b3e; font-size:15px; line-height:1.6;\">Le premier echange est gratuit et sans engagement. Renseignez vos coordonnees, je vous recontacte.<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:14px; margin-top:22px;\">\n          <label style=\"display:flex; flex-direction:column; gap:6px;\">\n            <span style=\"font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#7a6b5e;\">Nom<\u002Fspan>\n            <input oninput=\"{{ onNom }}\" type=\"text\" placeholder=\"Votre nom\" style=\"border:1px solid #ddcbb0; border-radius:12px; background:#fff; padding:12px 14px; font-size:15px; font-family:'Hanken Grotesk',sans-serif; color:#3a2a20; outline:none;\">\n          <\u002Flabel>\n          <label style=\"display:flex; flex-direction:column; gap:6px;\">\n            <span style=\"font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#7a6b5e;\">Telephone<\u002Fspan>\n            <input oninput=\"{{ onTel }}\" type=\"tel\" placeholder=\"06 00 00 00 00\" style=\"border:1px solid #ddcbb0; border-radius:12px; background:#fff; padding:12px 14px; font-size:15px; font-family:'Hanken Grotesk',sans-serif; color:#3a2a20; outline:none;\">\n          <\u002Flabel>\n          <label style=\"display:flex; flex-direction:column; gap:6px;\">\n            <span style=\"font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#7a6b5e;\">Email<\u002Fspan>\n            <input oninput=\"{{ onEmail }}\" type=\"email\" placeholder=\"vous@email.fr\" style=\"border:1px solid #ddcbb0; border-radius:12px; background:#fff; padding:12px 14px; font-size:15px; font-family:'Hanken Grotesk',sans-serif; color:#3a2a20; outline:none;\">\n          <\u002Flabel>\n          <label style=\"display:flex; flex-direction:column; gap:6px;\">\n            <span style=\"font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#7a6b5e;\">Votre demande<\u002Fspan>\n            <textarea oninput=\"{{ onMessage }}\" rows=\"3\" placeholder=\"Decrivez brievement votre situation\" style=\"border:1px solid #ddcbb0; border-radius:12px; background:#fff; padding:12px 14px; font-size:15px; font-family:'Hanken Grotesk',sans-serif; color:#3a2a20; outline:none; resize:vertical;\"><\u002Ftextarea>\n          <\u002Flabel>\n        <\u002Fdiv>\n        <button onclick=\"{{ submitRdv }}\" style=\"margin-top:22px; width:100%; padding:14px 28px; border:none; border-radius:999px; background:#bc5b3a; color:#fff; font-size:16px; font-weight:700; cursor:pointer; font-family:'Hanken Grotesk',sans-serif;\">Envoyer la demande<\u002Fbutton>\n        <p style=\"margin:16px 0 0; text-align:center; color:#7a6b5e; font-size:13px;\">Ou directement : <a href=\"mailto:contact@lafabriquesociale.fr\" style=\"color:#bc5b3a; font-weight:600; text-decoration:none;\">contact@lafabriquesociale.fr<\u002Fa> · <a href=\"tel:0600000000\" style=\"color:#bc5b3a; font-weight:600; text-decoration:none;\">06 00 00 00 00<\u002Fa><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;showFloatCard&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},\n  &quot;showStepsSection&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},\n  &quot;heroPortraitRight&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}\n}\">\nclass Component extends DCLogic {\n  state = { open: null, aboutOpen: false, rdvOpen: false, form: { nom: '', tel: '', email: '', message: '' } };\n  DOMAINS = {\n    budget: {\n      title: \"Le budget\",\n      intro: \"Reprendre le controle de vos finances, etape par etape.\",\n      points: [\n        \"Etablir un budget realiste et degager des marges de manoeuvre\",\n        \"Mobiliser les aides financieres possibles (CAF, FSL, aides d'urgence)\",\n        \"Constituer et suivre un dossier de surendettement aupres de la Banque de France\",\n        \"Negocier des delais ou des echeanciers avec vos creanciers\",\n      ],\n    },\n    famille: {\n      title: \"La famille\",\n      intro: \"Un appui dans les moments charnieres de la vie familiale.\",\n      points: [\n        \"Soutien a la parentalite et mediation des conflits familiaux\",\n        \"Accompagnement dans le deuil et les ruptures\",\n        \"Perte d'autonomie d'un proche age : APA, aides a domicile, placement\",\n        \"Orientation vers les structures et relais adaptes\",\n      ],\n    },\n    handicap: {\n      title: \"Le handicap\",\n      intro: \"Faire reconnaitre vos droits et securiser votre quotidien.\",\n      points: [\n        \"Constitution du dossier MDPH : RQTH, AAH, PCH\",\n        \"Maintien dans l'emploi et amenagement du poste de travail\",\n        \"Recherche d'aides materielles, humaines et financieres\",\n        \"Orientation vers les dispositifs et etablissements specialises\",\n      ],\n    },\n    insertion: {\n      title: \"L'insertion\",\n      intro: \"Retrouver une dynamique professionnelle et stabiliser sa situation.\",\n      points: [\n        \"Bilan de situation et definition d'un projet realiste\",\n        \"Reconversion professionnelle et maintien dans l'emploi\",\n        \"Recherche de logement et activation des leviers financiers\",\n        \"Coordination avec France Travail et les organismes d'insertion\",\n      ],\n    },\n    retraite: {\n      title: \"La retraite\",\n      intro: \"Preparer et securiser votre passage a la retraite.\",\n      points: [\n        \"Verification et mise a jour du releve de carriere\",\n        \"Constitution de la demande de retraite\",\n        \"Evaluation d'un depart anticipe : carriere longue, penibilite\",\n        \"Estimation des droits et des aides complementaires\",\n      ],\n    },\n    sante: {\n      title: \"La sante\",\n      intro: \"Etre accompagne face a la maladie, pour vous et vos proches.\",\n      points: [\n        \"Accompagnement de la personne malade et de son entourage\",\n        \"Constitution des dossiers d'invalidite et de maladie professionnelle\",\n        \"Acces aux droits sante : couverture, complementaire, ALD\",\n        \"Coordination avec les equipes medicales et sociales\",\n      ],\n    },\n  };\n  open(key) { this.setState({ open: key }); }\n  openAbout() { this.setState({ aboutOpen: true }); }\n  openRdv() { this.setState({ rdvOpen: true }); }\n  setField(k, v) { this.setState(s => ({ form: { ...s.form, [k]: v } })); }\n  submitRdv() {\n    const { nom, tel, email, message } = this.state.form;\n    const subject = encodeURIComponent('Demande de rendez-vous' + (nom ? ' - ' + nom : ''));\n    const body = encodeURIComponent('Nom : ' + nom + '\\nTelephone : ' + tel + '\\nEmail : ' + email + '\\n\\n' + message);\n    window.location.href = 'mailto:contact@lafabriquesociale.fr?subject=' + subject + '&body=' + body;\n  }\n  close() { this.setState({ open: null, aboutOpen: false, rdvOpen: false }); }\n  renderVals() {\n    const d = this.state.open ? this.DOMAINS[this.state.open] : null;\n    return {\n      showFloatCard: this.props.showFloatCard ?? true,\n      showStepsSection: this.props.showStepsSection ?? true,\n      heroDir: (this.props.heroPortraitRight ?? true) ? 'row' : 'row-reverse',\n      isModalOpen: !!d,\n      modalTitle: d ? d.title : '',\n      modalIntro: d ? d.intro : '',\n      modalPoints: d ? d.points : [],\n      closeModal: () => this.close(),\n      stopProp: (e) => e.stopPropagation(),\n      openBudget: () => this.open('budget'),\n      openFamille: () => this.open('famille'),\n      openHandicap: () => this.open('handicap'),\n      openInsertion: () => this.open('insertion'),\n      openRetraite: () => this.open('retraite'),\n      openSante: () => this.open('sante'),\n      aboutOpen: this.state.aboutOpen,\n      openAbout: () => this.openAbout(),\n      rdvOpen: this.state.rdvOpen,\n      openRdv: () => this.openRdv(),\n      onNom: (e) => this.setField('nom', e.target.value),\n      onTel: (e) => this.setField('tel', e.target.value),\n      onEmail: (e) => this.setField('email', e.target.value),\n      onMessage: (e) => this.setField('message', e.target.value),\n      submitRdv: () => this.submitRdv(),\n      aboutParas: [\n        \"Diplomee d'Etat d'assistante de service social, j'exerce ce metier depuis plus de 10 ans.\",\n        \"J'ai accompagne des publics tres varies : protection de l'enfance et de l'adolescence, service social de proximite en collectivite, et service social du travail en entreprise.\",\n        \"Ces experiences m'ont appris a m'adapter a chaque situation et a coordonner les nombreux interlocuteurs : CAF, MDPH, France Travail, organismes de retraite, equipes medicales et sociales.\",\n        \"En exercant en liberal, je peux enfin prendre le temps necessaire avec chaque personne : un accompagnement confidentiel, sans jugement, et entierement adapte a vos besoins.\",\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
